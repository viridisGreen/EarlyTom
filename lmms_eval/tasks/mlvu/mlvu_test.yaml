dataset_path: sy1998/MLVU_Test
dataset_kwargs:
  token: True
  cache_dir: ~/.cache/huggingface/mlvu_test
  video: True
generation_kwargs:
  # max_new_tokens: 16
  # temperature: 0
  # top_p: 1.0
  # num_beams: 1
  # do_sample: false
  max_new_tokens: 40960
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  do_sample: true
  repetition_penalty: 1.0
task: mlvu_test
test_split: test
output_type: generate_until
doc_to_visual: !function utils.mlvu_doc_to_visual_test
doc_to_text: !function utils.mlvu_doc_to_text
doc_to_target: "answer"
# The return value of process_results will be used by metrics
process_results: !function utils.mlvu_process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: mlvu_percetion_score
    aggregation: !function utils.mlvu_aggregate_results_test
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: "Select the best answer to the following multiple-choice question based on the video Respond with only the letter (A, B, C, or D) of the correct option."
    post_prompt: "Please reason step-by-step, identify relevant visual content, analyze key timestamps and clues, and then provide the final answer."
  


